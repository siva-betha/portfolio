<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- Header/Navigation will go here later -->
    
    <main>
        <!-- Hero Section -->
        <section id="hero" class="hero-section">
            <div class="container" id="hero-container">
                <!-- Hero content will be injected by JavaScript -->
            </div>
        </section>

        <!-- About Section -->
        <section id="about" class="about-section">
            <div class="container" id="about-container">
                <!-- About content will be injected by JavaScript -->
            </div>
        </section>

        <!-- Projects Section -->
        <section id="projects" class="projects-section">
            <div class="container">
                <h2 class="section-title" id="projects-title"></h2>
                <div class="projects-grid" id="projects-container">
                    <!-- Projects will be injected by JavaScript -->
                </div>
            </div>
        </section>

        <!-- Contact Section -->
        <section id="contact" class="contact-section">
            <div class="container" id="contact-container">
                <!-- Contact content will be injected by JavaScript -->
            </div>
        </section>
    </main>

    <footer id="footer-container">
        <!-- Footer will be injected by JavaScript -->
    </footer>
    
    <script src="js/data.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
