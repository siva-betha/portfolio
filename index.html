<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- Add loading indicator -->
    <div id="loading" class="loading">Loading...</div>
    
    <main style="display: none;" id="main-content">
        <section id="hero" class="hero-section">
            <div class="container" id="hero-container"></div>
        </section>

        <section id="about" class="about-section">
            <div class="container" id="about-container"></div>
        </section>

        <section id="projects" class="projects-section">
            <div class="container">
                <div class="projects-grid" id="projects-container"></div>
            </div>
        </section>

        <section id="contact" class="contact-section">
            <div class="container" id="contact-container"></div>
        </section>
    </main>

    <footer id="footer-container"></footer>
    
    <!-- Load scripts in order -->
    <script src="js/data.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
